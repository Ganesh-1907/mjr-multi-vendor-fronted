<mat-sidenav-container class="dashboard-container">
  <mat-sidenav #sidenav [opened]="isSidenavOpen" mode="side" class="sidenav" fixedInViewport="true">
    <div class="sidenav-header">
      <a routerLink="/" class="logo">
        <mat-icon>shopping_bag</mat-icon>
        <span>MarketPlace</span>
      </a>
    </div>

    <mat-nav-list>
      @for (item of menuItems(); track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <mat-icon matListItemIcon>{{item.icon}}</mat-icon>
          <span matListItemTitle>{{item.label}}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-divider></mat-divider>
      <a mat-list-item routerLink="/" class="back-to-store">
        <mat-icon matListItemIcon>storefront</mat-icon>
        <span matListItemTitle>Back to Store</span>
      </a>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <mat-toolbar class="dashboard-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" class="menu-toggle">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="spacer"></span>

      <button mat-icon-button [matMenuTriggerFor]="themeMenu">
        <mat-icon>{{theme.isDarkMode() ? 'light_mode' : 'dark_mode'}}</mat-icon>
      </button>
      <mat-menu #themeMenu="matMenu">
        <button mat-menu-item (click)="theme.setDarkMode(false)">
          <mat-icon>light_mode</mat-icon>
          <span>Light Mode</span>
        </button>
        <button mat-menu-item (click)="theme.setDarkMode(true)">
          <mat-icon>dark_mode</mat-icon>
          <span>Dark Mode</span>
        </button>
      </mat-menu>

      @if (auth.userRole() === 'customer') {
        <a mat-icon-button routerLink="/cart" [matBadge]="cart.itemCount()" [matBadgeHidden]="cart.itemCount() === 0" matBadgeColor="warn">
          <mat-icon>shopping_cart</mat-icon>
        </a>
      }

      <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu">
        <div class="user-avatar">{{userInitials()}}</div>
        <span class="user-name hide-mobile">{{userName()}}</span>
      </button>
      <mat-menu #userMenu="matMenu">
        <a mat-menu-item [routerLink]="['/customer/profile']">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </a>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
