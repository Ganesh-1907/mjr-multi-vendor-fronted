<mat-sidenav-container class="dashboard-container">
  <mat-sidenav #sidenav [opened]="isSidenavOpen" [mode]="isMobile ? 'over' : 'side'" class="sidenav" fixedInViewport="true">
    <div class="sidenav-header">
      <a routerLink="/" class="logo">
        <mat-icon>shopping_bag</mat-icon>
        <span class="logo-text">N-CommerceHub</span>
      </a>
    </div>

    <mat-nav-list>
      @for (item of menuItems(); track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeSidenavOnMobile()">
          <mat-icon matListItemIcon>{{item.icon}}</mat-icon>
          <span matListItemTitle>{{item.label}}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-divider></mat-divider>
      <a mat-list-item routerLink="/" class="back-to-store" (click)="closeSidenavOnMobile()">
        <mat-icon matListItemIcon>storefront</mat-icon>
        <span matListItemTitle>Back to Store</span>
      </a>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <mat-toolbar class="dashboard-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" class="menu-toggle">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="spacer"></span>

      <!-- One-click direct theme toggle -->
      <button mat-icon-button (click)="theme.toggleTheme()" class="theme-toggle-btn" [title]="theme.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <mat-icon class="theme-icon">{{theme.isDarkMode() ? 'light_mode' : 'dark_mode'}}</mat-icon>
      </button>

      <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu">
        <span class="user-avatar">{{userInitials()}}</span>
        <span class="user-name hide-mobile">{{userName()}}</span>
      </button>
      <mat-menu #userMenu="matMenu">
        <a mat-menu-item [routerLink]="getDashboardUrl()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </a>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
